---

name: Molecule
on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
    paths-ignore:
      - '**/*.md'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v5

      - name: Set up Python 3.
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install test dependencies.
        run: pip3 install yamllint

      - name: Lint code.
        run: |
          yamllint .

  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - almalinux8
          - almalinux9
          - almalinux10
          - debian10
          - debian11
          - debian12
          - fedora40
          - fedora41
          - fedora42
          - rockylinux8
          - rockylinux9
          - rockylinux10
          - ubuntu2204
          - ubuntu2404
        include:
          # These legs ship a managed-node Python below ansible-core 2.17's floor
          # (module_utils/_internal uses positional-only params, Python 3.8+):
          # debian10 has 3.7.3, almalinux8/rockylinux8 (EL8) have 3.6.8. Pin them
          # to ansible-core 2.16.x. Every other distro needs latest ansible for
          # dnf5/libdnf5 support (e.g. Fedora 41+).
          - distro: debian10
            ansible_pin: "ansible<10"
          - distro: almalinux8
            ansible_pin: "ansible<10"
          - distro: rockylinux8
            ansible_pin: "ansible<10"

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v5

      - name: Set up Python 3.
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install test dependencies.
        run: pip3 install "${{ matrix.ansible_pin || 'ansible' }}" molecule molecule-plugins[docker] docker cryptography

      - name: Run Molecule tests.
        run: molecule test
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}

  release:
    name: Release
    runs-on: ubuntu-latest
    environment: galaxy
    needs:
      - lint
      - molecule
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0

      - name: Release on galaxy
        uses: ansible-actions/ansible-galaxy-action@v1.2.0
        with:
          galaxy_api_key: ${{ secrets.GALAXY_API_KEY }}
